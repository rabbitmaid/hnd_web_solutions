<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web 2021 (b)</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <form action="">

        <table>
            <tr>
                <td>
                    <label for="firstName">First Name:</label>
                </td>
                <td>
                    <input type="text" id="firstName" placeholder="TUBUO" required />
                </td>
            </tr>

            <tr>
                <td>
                    <label for="email">Email:</label>
                </td>
                <td>
                    <input type="email" id="email" placeholder="ministry@gmail.com" required />
                </td>
            </tr>

            <tr>
                <td><label for="subject">Subject:</label></td>
                <td><input type="text" id="subject" placeholder="programming" required /></td>
            </tr>

            <tr>
                <td> <label for="country">Country:</label></td>
                <td>

                    <select id="country" required>
                        <option disabled selected>none</option>
                        <option value="cameroon">Cameroon</option>
                        <option value="nigeria">Nigeria</option>
                        <option value="togo">Togo</option>
                        <option value="gabon">Gabon</option>
                    </select>
                </td>
            </tr>


            <tr>
                <td> <label for="comment">Comment:</label></td>
                <td> <textarea id="comment" required></textarea></td>
            </tr>

            <tr>
                <td><label for="gender">Gender:</label></td>
                <td>
                    <label for="M">M</label>
                    <input type="radio" name="gender" id="M" />

                    <label for="F">F</label>
                    <input type="radio" name="gender" id="F">
                </td>
            </tr>

            <tr>
                <td> <label for="level">Highest degree level:</label></td>
                <td>
                    <div class="levels">

                        <div>
                            <input type="checkbox" id="post-doc">
                            <label for="post-doc">Post-Doc</label>
                        </div>

                        <div>
                            <input type="checkbox" id="phd">
                            <label for="phd">PhD</label>
                        </div>

                        <div>
                            <input type="checkbox" id="msc">
                            <label for="msc">Master/Msc</label>
                        </div>

                        <div>
                            <input type="checkbox" id="bsc">
                            <label for="bsc">Licence/Bsc</label>
                        </div>

                        <div>
                            <input type="checkbox" id="bacc">
                            <label for="bacc">BACC/AL-GCE</label>
                        </div>

                    </div>
                </td>
            </tr>

        </table>

        <button type="reset">Reset</button>
        <button type="submit">Submit</button>

    </form>





</body>

</html>
