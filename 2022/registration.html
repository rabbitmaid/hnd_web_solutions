<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
<style>

    form {
        border: 1px solid black;
        width: 400px;
        padding: 8px;
    }

    textarea {
        width: 100%;
        height: 100px;
    }

</style>
</head>

<body>

    <header>
        <div class="left">
            <a href="" class="logo">delidded</a>
           
            <nav>
                <a href="#">HTML</a>
                <a href="#">CSS</a>
                <a href="#">JavaScript</a>
                <a href="registration.html">Registration</a>
            </nav>

        </div>
        <div class="right">
            <a href="#">Login</a>
        </div>
    </header>

    <main>

        <h1>Register</h1>
        

        <form action="" id="registrationForm">

            <label for="firstName">First Name: </label>
            <input type="text" name="firstName" id="firstName" />

            <br /> <br />

            <label for="lastName">Last Name: </label>
            <input type="text" name="lastName" id="lastName" />

            <br /> <br />

            <label for="course">Course</label>
            <select name="course" id="course">
                <option disabled selected>Course</option>
            </select>

            <br/> <br />

            <label for="gender">Gender</label> <br />

            <input type="radio" name="gender" value="male" id="male"> 
            <label for="male">Male</label><br />
            
            <input type="radio" name="gender" value="female" id="female">
            <label for="female">Female</label> <br />

            <input type="radio" name="gender" value="other" id="other">
            <label for="other">Other</label> <br />

            <br/>

            <label for="phone">Phone: </label>
            <span>
                <input type="text" name="countryCode" id="countryCode" placeholder="+91" style="width: 40px;" >
                <input type="text" name="phoneNumber" id="phone">
            </span>

            <br/> <br />

            <label for="address">Address</label> <br />
            <textarea name="address" id="address"></textarea>

            <br/> <br />

            <label for="email">Email</label>
            <input type="email" name="email" id="email" />
            <br /> <br />

            <label for="password">Password</label>
            <input type="password" name="password" id="password" />
            <br /> <br />

            <label for="retypePassword">Retype Password</label>
            <input type="password" name="retypePassword" id="retypePassword" />
            <br /> <br />

            <button type="submit">Submit</button>
            
        </form>


    </main>


<script>

    const registrationForm = document.getElementById('registrationForm');

    registrationForm.addEventListener('submit', function(event) {
        event.preventDefault();

        const password = document.getElementById('password');
        const retypePassword = document.getElementById('retypePassword');

        if(password.value !== "" && retypePassword !== "") {

            if(password.value === retypePassword.value) {
                registrationForm.submit();
            }
            else {
                alert("The password must match the retype password");
            }
        }
        else {
            alert("The password fields cannot be empty");
        }

    });

</script>

</body>

</html>
